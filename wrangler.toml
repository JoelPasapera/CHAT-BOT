name = "mini-chat-gateway"
main = "worker.js"
compatibility_date = "2026-01-01"

# --- Variables públicas (no secretas) ---
[vars]
# Pon tu dominio para bloquear orígenes ajenos, ej: "https://c48484518.github.io"
# "*" deja pasar cualquier origen (cómodo para empezar).
ALLOWED_ORIGIN = "*"
# Opcional: referer que el Worker manda a OpenRouter.
# OPENROUTER_REFERER = "https://c48484518.github.io"

# --- Secrets (NO se ponen aquí, son privados) ---
# Configúralos uno a uno con:
#   npx wrangler secret put GEMINI_API_KEY     <- recomendado (visión)
#   npx wrangler secret put POLLINATIONS_KEY   <- opcional
#   npx wrangler secret put OPENROUTER_KEY     <- opcional
#   npx wrangler secret put LLM7_TOKEN         <- opcional
#   npx wrangler secret put APP_TOKEN          <- opcional (anti-abuso)
