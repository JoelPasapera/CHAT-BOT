<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini chat · sin registro</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="styles.css">
<base target="_blank">
</head>
<body>
<div class="app">

  <header>
    <div class="head-tools">
      <div class="brand"><span class="dot" id="statusDot"></span>mini-chat</div>
      <div class="vision-badge" id="visionBadge" title="Este modelo puede analizar imágenes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        Visión
      </div>
    </div>
    <div class="head-tools">
      <select id="modelSelect" aria-label="Modelo">
        <option>cargando modelos…</option>
      </select>
      <button class="icon-btn" id="newChatBtn" type="button" title="Vaciar la conversación">Nuevo</button>
    </div>
  </header>

  <main id="messages">
    <p class="empty" id="emptyHint">
      Sin cuentas ni keys para el usuario.<br><br>
      Escribe tu mensaje o <strong>arrastra una imagen</strong> aquí.<br>
      También puedes pegarla con <kbd>Ctrl+V</kbd>.<br><br>
      Los modelos marcados con <span class="eye">👁</span> aceptan imágenes.
    </p>
  </main>

  <footer>
    <div class="img-preview-area" id="imgPreviewArea"></div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Escribe un mensaje… (Enter envía · Shift+Enter salto de línea)" autocomplete="off" autofocus></textarea>
      <button class="attach-btn" id="attachBtn" type="button" title="Adjuntar imagen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button id="sendBtn" type="button">Enviar</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
  </footer>

</div>

<div class="img-modal" id="imgModal"><img id="imgModalImg" src="" alt="Vista ampliada"></div>

<script type="module" src="app.js"></script>
</body>
</html>
